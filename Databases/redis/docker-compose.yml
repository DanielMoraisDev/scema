networks:
  databases:
    external: true
    name: databases

services:
  redis_scema:
    image: redis/redis-stack:latest
    container_name: redis_scema
    restart: unless-stopped
    command:
      - redis-stack-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD}
    ports:
      - "6380:6379"
    volumes:
      - redis_scema_data:/data
    networks:
      - databases

volumes:
  redis_scema_data:
    driver: local
    name: redis_scema_data
